<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVE Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #00ff88;
        }
        
        .header h1 {
            color: #00ff88;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .nav {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav a {
            color: #00ff88;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
        }
        
        .nav a:hover {
            text-decoration: underline;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .search-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .search-box input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .create-listing {
            background: rgba(0, 255, 136, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #00cc6a;
        }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .filter-btn.active {
            background: #00ff88;
            color: #000;
        }
        
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .listing-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s;
        }
        
        .listing-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 136, 0.5);
        }
        
        .listing-card.sell {
            border-left: 4px solid #00ff88;
        }
        
        .listing-card.buy {
            border-left: 4px solid #00ccff;
        }
        
        .listing-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .listing-type {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .listing-type.sell {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }
        
        .listing-type.buy {
            background: rgba(0, 204, 255, 0.2);
            color: #00ccff;
        }
        
        .listing-id {
            color: #888;
            font-size: 0.85em;
        }
        
        .item-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .listing-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .detail {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 5px;
        }
        
        .detail-label {
            font-size: 0.8em;
            color: #888;
        }
        
        .detail-value {
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .price {
            color: #00ff88;
        }
        
        .total {
            color: #ff9500;
        }
        
        .seller {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 10px;
        }
        
        .listing-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-contact {
            flex: 1;
            background: rgba(0, 204, 255, 0.2);
            color: #00ccff;
            border: 1px solid #00ccff;
        }
        
        .btn-contact:hover {
            background: rgba(0, 204, 255, 0.3);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 5px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #00ff88;
        }
        
        .stat-label {
            font-size: 0.85em;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛒 EVE Player Marketplace</h1>
        <p>Buy and sell items with your corp and alliance</p>
    </div>
    
    <div class="nav">
        <a href="/">📊 Dashboard</a>
        <a href="/marketplace">🛒 Marketplace</a>
        <a href="/jf-booking">🚀 JF Booking</a>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="stat-active">-</div>
                <div class="stat-label">Active Listings</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-selling">-</div>
                <div class="stat-label">For Sale</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-buying">-</div>
                <div class="stat-label">Buy Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-total-value">-</div>
                <div class="stat-label">Total Value</div>
            </div>
        </div>
        
        <div class="controls">
            <div class="search-box">
                <h3>🔍 Search Items</h3>
                <input type="text" id="search-input" placeholder="Search for items...">
            </div>
            <div class="create-listing">
                <h3>➕ Create Listing</h3>
                <button class="btn" onclick="showCreateModal()">Create New Listing</button>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterListings('all')">All</button>
            <button class="filter-btn" onclick="filterListings('sell')">For Sale</button>
            <button class="filter-btn" onclick="filterListings('buy')">Buy Orders</button>
        </div>
        
        <div id="listings-container" class="listings-grid">
            <div class="loading">Loading marketplace...</div>
        </div>
    </div>
    
    <!-- Create Listing Modal -->
    <div id="create-modal" class="modal">
        <div class="modal-content">
            <h2>Create New Listing</h2>
            <form id="create-form">
                <div class="form-group">
                    <label>Listing Type</label>
                    <select id="listing-type" required>
                        <option value="sell">I want to SELL</option>
                        <option value="buy">I want to BUY</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" id="item-name" placeholder="e.g., Drake" required>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" placeholder="1" min="1" required>
                </div>
                <div class="form-group">
                    <label>Price per Unit (ISK)</label>
                    <input type="number" id="price" placeholder="95000000" min="1" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="e.g., D-PN" required>
                </div>
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <textarea id="description" rows="3" placeholder="Additional details..."></textarea>
                </div>
                <div class="form-group">
                    <label>Your Character Name</label>
                    <input type="text" id="seller-name" placeholder="Your EVE character" required>
                </div>
                <button type="submit" class="btn">Create Listing</button>
                <button type="button" class="btn" style="background: #666; margin-left: 10px;" onclick="hideCreateModal()">Cancel</button>
            </form>
        </div>
    </div>
    
    <script>
        let allListings = [];
        let currentFilter = 'all';
        
        // Load marketplace data
        async function loadMarketplace() {
            try {
                const response = await fetch('/api/marketplace');
                allListings = await response.json();
                displayListings();
                updateStats();
            } catch (error) {
                console.error('Error loading marketplace:', error);
                document.getElementById('listings-container').innerHTML = 
                    '<div class="loading">Error loading marketplace</div>';
            }
        }
        
        // Display listings
        function displayListings() {
            const container = document.getElementById('listings-container');
            let listings = allListings;
            
            // Apply filter
            if (currentFilter !== 'all') {
                listings = listings.filter(l => l.listing_type === currentFilter);
            }
            
            // Apply search
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (searchTerm) {
                listings = listings.filter(l => 
                    l.item_name.toLowerCase().includes(searchTerm) ||
                    l.location.toLowerCase().includes(searchTerm)
                );
            }
            
            if (listings.length === 0) {
                container.innerHTML = '<div class="loading">No listings found</div>';
                return;
            }
            
            container.innerHTML = listings.map(listing => `
                <div class="listing-card ${listing.listing_type}">
                    <div class="listing-header">
                        <span class="listing-type ${listing.listing_type}">
                            ${listing.listing_type === 'sell' ? '💰 SELLING' : '📥 BUYING'}
                        </span>
                        <span class="listing-id">#${listing.id}</span>
                    </div>
                    <div class="item-name">${listing.item_name}</div>
                    <div class="listing-details">
                        <div class="detail">
                            <div class="detail-label">Quantity</div>
                            <div class="detail-value">${listing.quantity.toLocaleString()}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Price/Unit</div>
                            <div class="detail-value price">${formatISK(listing.price_per_unit)}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Location</div>
                            <div class="detail-value">${listing.location}</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Total Value</div>
                            <div class="detail-value total">${formatISK(listing.total_value)}</div>
                        </div>
                    </div>
                    <div class="seller">👤 ${listing.seller_name}</div>
                    ${listing.description ? `<div style="font-size: 0.9em; color: #888; margin-bottom: 10px;">${listing.description}</div>` : ''}
                    <div class="listing-actions">
                        <button class="btn btn-contact" onclick="contactSeller('${listing.seller_name}', '${listing.item_name}')">
                            Contact Seller
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // Update statistics
        function updateStats() {
            document.getElementById('stat-active').textContent = allListings.length;
            document.getElementById('stat-selling').textContent = 
                allListings.filter(l => l.listing_type === 'sell').length;
            document.getElementById('stat-buying').textContent = 
                allListings.filter(l => l.listing_type === 'buy').length;
            
            const totalValue = allListings.reduce((sum, l) => sum + l.total_value, 0);
            document.getElementById('stat-total-value').textContent = formatISK(totalValue);
        }
        
        // Format ISK numbers
        function formatISK(num) {
            if (num >= 1000000000) return (num / 1000000000).toFixed(2) + 'B';
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        // Filter listings
        function filterListings(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            displayListings();
        }
        
        // Search functionality
        document.getElementById('search-input').addEventListener('input', displayListings);
        
        // Modal functions
        function showCreateModal() {
            document.getElementById('create-modal').classList.add('active');
        }
        
        function hideCreateModal() {
            document.getElementById('create-modal').classList.remove('active');
        }
        
        // Create listing
        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                listing_type: document.getElementById('listing-type').value,
                item_name: document.getElementById('item-name').value,
                quantity: parseInt(document.getElementById('quantity').value),
                price_per_unit: parseFloat(document.getElementById('price').value),
                location: document.getElementById('location').value,
                description: document.getElementById('description').value,
                seller_name: document.getElementById('seller-name').value,
                user_id: 'web_user'
            };
            
            try {
                const response = await fetch('/api/marketplace/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    hideCreateModal();
                    document.getElementById('create-form').reset();
                    loadMarketplace();
                    alert('✅ Listing created successfully!');
                } else {
                    alert('❌ Failed to create listing');
                }
            } catch (error) {
                console.error('Error creating listing:', error);
                alert('❌ Error creating listing');
            }
        });
        
        // Contact seller
        function contactSeller(sellerName, itemName) {
            alert(`📧 Contact ${sellerName} in-game about: ${itemName}\n\n` +
                  `Copy this message:\n` +
                  `Hi ${sellerName}, I'm interested in your ${itemName} listing on the WinterCo marketplace.`);
        }
        
        // Load data on page load
        loadMarketplace();
        
        // Auto-refresh every 30 seconds
        setInterval(loadMarketplace, 30000);
    </script>
</body>
</html>
